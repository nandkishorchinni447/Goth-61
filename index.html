<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brain Reactor Ultra Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
 --accent:#38bdf8;
 --bg:#020617;
 --card:rgba(15,23,42,.6);
 --gold:#fbbf24;
 --bronze:#cd7f32;
 --silver:#cbd5e1;
 --diamond:#7dd3fc;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
 font-family:Inter,system-ui;
 background:radial-gradient(circle at center,#03121f 0%,#000814 80%);
 color:#fff;
 display:flex;
 justify-content:center;
 align-items:center;
 min-height:100vh;
 overflow:hidden;
 position:relative;
}

/* ENERGY BACKGROUND */
body::before{
 content:"";
 position:absolute;
 inset:0;
 background:
 radial-gradient(circle at 20% 30%,rgba(0,255,255,.15),transparent 40%),
 radial-gradient(circle at 80% 70%,rgba(0,200,255,.12),transparent 40%);
 animation:bgMove 14s infinite alternate ease-in-out;
}
@keyframes bgMove{
 0%{transform:scale(1)}
 100%{transform:scale(1.15)}
}

/* LIGHTNING SVG */
.bolt-svg{
 position:absolute;
 width:150%;
 height:150%;
 opacity:.85;
 pointer-events:none;
 animation:float 6s infinite ease-in-out;
}
@keyframes float{
 0%,100%{transform:translateY(0)}
 50%{transform:translateY(-12px)}
}

.container{
 width:92%;
 max-width:430px;
 background:var(--card);
 padding:2rem;
 border-radius:30px;
 backdrop-filter:blur(30px);
 border:1px solid rgba(56,189,248,.25);
 text-align:center;
 position:relative;
 z-index:10;
 box-shadow:0 0 60px rgba(56,189,248,.25);
 animation:fadeIn .8s ease-out;
}
@keyframes fadeIn{
 from{opacity:0;transform:translateY(20px)}
 to{opacity:1;transform:translateY(0)}
}

h1{
 font-size:2.2rem;
 font-weight:800;
 background:linear-gradient(#fff,#94a3b8);
 -webkit-background-clip:text;
 -webkit-text-fill-color:transparent;
}

.logo{
 font-size:60px;
 margin-bottom:10px;
 animation:pulse 2s infinite;
}
@keyframes pulse{
 0%,100%{transform:scale(1)}
 50%{transform:scale(1.1)}
}

.btn{
 width:100%;
 padding:15px;
 border:none;
 border-radius:18px;
 font-weight:800;
 margin-top:12px;
 cursor:pointer;
 background:var(--accent);
 color:#020617;
 box-shadow:0 0 25px rgba(56,189,248,.5);
 transition:.2s;
}
.btn:hover{
 transform:translateY(-3px);
 box-shadow:0 0 45px rgba(56,189,248,.9);
}

.hidden{display:none!important}

/* GAME UI */
.task{
 font-size:42px;
 font-weight:800;
 min-height:120px;
 display:flex;
 align-items:center;
 justify-content:center;
 margin:15px 0;
}

.options{
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
}

.option{
 padding:20px;
 border-radius:18px;
 font-size:20px;
 font-weight:700;
 background:rgba(255,255,255,.05);
 border:1px solid rgba(255,255,255,.1);
 color:#fff;
 cursor:pointer;
 transition:.15s;
}
.option:hover{
 background:rgba(56,189,248,.2);
}

.progress{
 height:6px;
 background:rgba(0,0,0,.3);
 border-radius:10px;
 margin:15px 0;
 overflow:hidden;
}
.fill{
 height:100%;
 width:100%;
 background:var(--accent);
}

.badge{
 margin-top:10px;
 font-weight:900;
}

/* SHAKE */
.shake{animation:shake .25s}
@keyframes shake{
 25%{transform:translateX(-8px)}
 75%{transform:translateX(8px)}
}

.flash{
 animation:flash .3s;
}
@keyframes flash{
 0%{background:#f43f5e}
 100%{background:transparent}
}
</style>
</head>

<body>

<!-- LIGHTNING -->
<svg class="bolt-svg" viewBox="0 0 800 300">
<defs>
<linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#00f7ff"/>
<stop offset="50%" stop-color="#00cfff"/>
<stop offset="100%" stop-color="#7df9ff"/>
</linearGradient>
<filter id="glow">
<feGaussianBlur stdDeviation="10" result="b"/>
<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
</defs>
<path d="M50 180 L300 40 L250 160 L500 80 L420 260 L750 120 L600 260 Z"
 fill="url(#g)" filter="url(#glow)">
<animate attributeName="opacity" values="0.8;1;0.8" dur="2.5s" repeatCount="indefinite"/>
</path>
</svg>

<!-- HOME -->
<div class="container" id="home">
<div class="logo">🧠</div>
<h1>BRAIN REACTOR</h1>
<p style="opacity:.6;margin-top:6px">Quantum Cognitive Testing</p>
<button class="btn" onclick="startGame('solo')">SOLO BLITZ</button>
<button class="btn" onclick="startGame('friend')" style="background:transparent;color:var(--accent);border:2px solid var(--accent)">FRIEND VS MODE</button>
</div>

<!-- GAME -->
<div class="container hidden" id="game">
<div style="display:flex;justify-content:space-between;font-size:13px;opacity:.7">
<span id="playerLabel">PLAYER 1</span>
<span id="scoreLabel">SCORE: 0</span>
</div>
<div class="progress"><div class="fill" id="timerBar"></div></div>
<div class="task" id="task"></div>
<div class="options" id="options"></div>
<div class="badge" id="badge"></div>
</div>

<!-- RESULT -->
<div class="container hidden" id="result">
<h1 id="resTitle">RESULT</h1>
<div id="resStats" style="margin:20px 0;font-size:18px"></div>
<button class="btn" onclick="location.reload()">PLAY AGAIN</button>
</div>

<script>
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function sfx(f,t,d){
 const o=audioCtx.createOscillator(),g=audioCtx.createGain();
 o.type=t;o.frequency.value=f;
 g.gain.setValueAtTime(.12,audioCtx.currentTime);
 g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+d);
 o.connect(g);g.connect(audioCtx.destination);
 o.start();o.stop(audioCtx.currentTime+d);
}

let game={mode:'solo',player:0,scores:[0,0],round:0,max:10,answer:null,timer:null,xp:0,level:1};

function startGame(mode){
 game.mode=mode;
 document.getElementById('home').classList.add('hidden');
 document.getElementById('game').classList.remove('hidden');
 next();
}

function next(){
 if(game.round>=game.max){endGame();return;}
 game.round++;

 let type=Math.floor(Math.random()*3);
 let q,a,opts=[];

 if(type===0){
  let x=2+Math.floor(Math.random()*9);
  let y=2+Math.floor(Math.random()*9);
  q=x+" × "+y;
  a=x*y;
  opts=[a,a+2,a-3,a+5].sort(()=>Math.random()-.5);
 }
 else if(type===1){
  const colors=['RED','BLUE','GREEN','YELLOW'];
  let t=colors[Math.floor(Math.random()*4)];
  let c=colors[Math.floor(Math.random()*4)];
  q='<span style="color:'+c.toLowerCase()+'">'+t+'</span>';
  a=(t===c?'YES':'NO');
  opts=['YES','NO'];
 }
 else{
  const arr=['⬆️','⬇️','⬅️','➡️'];
  a=arr[Math.floor(Math.random()*4)];
  q=a;
  opts=[...arr].sort(()=>Math.random()-.5);
 }

 game.answer=a;
 document.getElementById('task').innerHTML=q;

 const box=document.getElementById('options');
 box.innerHTML='';
 opts.forEach(o=>{
  let b=document.createElement('button');
  b.className='option';
  b.innerText=o;
  b.onclick=()=>check(o);
  box.appendChild(b);
 });

 startTimer();
}

function startTimer(){
 clearInterval(game.timer);
 const limit=2000;
 const start=Date.now();
 game.timer=setInterval(()=>{
  let p=1-(Date.now()-start)/limit;
  document.getElementById('timerBar').style.width=(p*100)+'%';
  if(p<=0)check(null);
 },20);
}

function check(v){
 clearInterval(game.timer);
 if(v===game.answer){
  sfx(880,'sine',.1);
  game.scores[0]+=10;
  game.xp+=5;
  updateLevel();
  next();
 }else{
  sfx(150,'triangle',.2);
  document.body.classList.add('flash');
  setTimeout(()=>document.body.classList.remove('flash'),300);
  document.getElementById('game').classList.add('shake');
  setTimeout(()=>document.getElementById('game').classList.remove('shake'),250);
  next();
 }
 document.getElementById('scoreLabel').innerText="SCORE: "+game.scores[0];
}

function updateLevel(){
 if(game.xp>=game.level*50){
  game.level++;
 }
 document.getElementById('badge').innerText="LEVEL "+game.level;
}

function endGame(){
 document.getElementById('game').classList.add('hidden');
 document.getElementById('result').classList.remove('hidden');
 document.getElementById('resStats').innerHTML=
 "FINAL SCORE<br><b style='font-size:32px'>"+game.scores[0]+"</b><br><br>LEVEL "+game.level;
}
</script>

</body>
</html>
